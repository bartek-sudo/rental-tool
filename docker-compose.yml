services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentaltooldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentaltooldb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./rentalTool-BackEnd
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/rentaltooldb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - APP_FRONTEND_URL=http://localhost
      - APP_BACKEND_URL=http://localhost:8080
    volumes:
      - ./rentalTool-BackEnd/uploads/images:/app/uploads/images
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./rentalTool-FrontEnd
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: